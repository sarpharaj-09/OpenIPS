; PlatformIO Project Configuration File
;
; NOTE: The official PlatformIO "espressif32" platform tops out at
; Arduino-ESP32 core 2.0.x (IDF 4.4), which does NOT expose real ESP-NOW
; RSSI (no esp_now_recv_info_t / rx_ctrl). We pin to the pioarduino
; community fork, which ships Arduino-ESP32 core 3.x (IDF 5.x) and gives
; us info->rx_ctrl->rssi in the recv callback.
;
; https://github.com/pioarduino/platform-espressif32

[platformio]
default_envs = gateway

[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
# 460800 is more reliable on many Windows USB-UART bridges than 921600.
upload_speed = 460800
upload_port = COM4

[env:gateway]
extends = common
build_flags = -D NODE_ROLE_GATEWAY

[env:anchor0]
extends = common
build_flags = 
    -D NODE_ROLE_ANCHOR
    -D ANCHOR_ID=0

[env:anchor1]
extends = common
build_flags = 
    -D NODE_ROLE_ANCHOR
    -D ANCHOR_ID=1

[env:anchor2]
extends = common
build_flags = 
    -D NODE_ROLE_ANCHOR
    -D ANCHOR_ID=2

[env:mobile]
extends = common
build_flags = -D NODE_ROLE_MOBILE